name: Security report
description: For potential vulnerabilities (prefer private advisory flow)
title: "[Security]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include exploit details in public issues.
        Prefer private reporting through SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: High-level summary
      description: Briefly describe concern without exploit details.
    validations:
      required: true
  - type: input
    id: affected_version
    attributes:
      label: Affected version/tag
    validations:
      required: true

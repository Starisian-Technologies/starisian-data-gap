name: Bug report
description: Report a defect in current behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide deterministic steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: wp_version
    attributes:
      label: WordPress version
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP version
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version/tag
    validations:
      required: true

name: Regression report
description: Behavior that worked previously and now fails
title: "[Regression]: "
labels: ["bug", "regression"]
body:
  - type: textarea
    id: previous_behavior
    attributes:
      label: Previously working behavior
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current failing behavior
    validations:
      required: true
  - type: input
    id: introduced_in
    attributes:
      label: First known bad version/tag
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
